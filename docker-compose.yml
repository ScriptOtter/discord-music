version: '3.9'

services:
  postgres:
    container_name: postgres
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - discord-music-release

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-music-release
    restart: always
    environment:
      - NODE_ENV=${NODE_ENV_RELEASE}
      - DISCORD_TOKEN=${DISCORD_TOKEN_RELEASE}
      - DISCORD_DEVELOPMENT_GUILD_ID=${DISCORD_DEVELOPMENT_GUILD_ID_RELEASE}
      - DATABASE_URL=${DATABASE_URL_RELEASE}
    ports:
      - '4200:4200'
    volumes:
      - /app/node_modules

    networks:
      - discord-music-release

volumes:
  postgres_data:

networks:
  discord-music-release:
